# cargo-deny configuration
# Install with: cargo install cargo-deny
# Run with: cargo deny check

[graph]
targets = []
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8

# We allow common permissive licenses used in Rust ecosystem
# Adjust based on your requirements
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
]

deny = [
    "GPL-3.0",  # Copyleft - may want to avoid
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

# Skip these dependencies for duplicate version checking
# (common to have multiple versions during development)
skip = []

# Deny these specific crates
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
